name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v2.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & Release (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest tests/ -v --tb=short

      - name: Build with PyInstaller
        run: uv run pyinstaller pdf_editor.spec --clean --noconfirm

      - name: Resolve tag
        id: tag
        shell: pwsh
        run: |
          $t = if ("${{ github.event.inputs.tag }}") { "${{ github.event.inputs.tag }}" } else { "${{ github.ref_name }}" }
          "tag=$t" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/*.exe
